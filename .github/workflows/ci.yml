name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required so the loader can reach the sibling BlissFont repo when
          # BLISSFONT_DIR is configured; otherwise tests use placeholder maps.
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest -q
